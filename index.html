<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Infinite Wilds</title>
    <style>
        body { margin:0; overflow:hidden; background:#000; font-family:Arial, sans-serif; }
        canvas { display:block; }
        #ui { position:absolute; top:10px; left:10px; color:white; pointer-events:none; text-shadow:0 0 5px black; z-index:100; }
        #crosshair { position:absolute; top:50%; left:50%; font-size:32px; transform:translate(-50%,-50%); color:white; text-shadow:0 0 8px black; pointer-events:none; z-index:100; }
        #score { position:absolute; top:10px; right:20px; color:#ffcc00; font-size:28px; text-shadow:0 0 8px black; z-index:100; }
        #ammo { position:absolute; bottom:80px; right:20px; color:white; font-size:24px; text-shadow:0 0 5px black; z-index:100; }
        #instructions { position:absolute; bottom:30px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.75); color:white; padding:12px 24px; border-radius:8px; text-align:center; z-index:100; }
    </style>
</head>
<body>
    <div id="ui">INFINITE WILDS<br>WASD Move • Mouse Look • Click Shoot • R Reload</div>
    <div id="score">Score: 0</div>
    <div id="crosshair">+</div>
    <div id="ammo">Ammo: <span id="ammoCount">30</span>/∞</div>
    <div id="instructions">Click screen to start</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/PointerLockControls.min.js"></script>

    <script>
        function noise(x, z) {
            return Math.sin(x * 0.018) * 16 + Math.sin(z * 0.018) * 16 + Math.sin((x + z) * 0.009) * 11 + Math.sin(x * 0.055) * 4;
        }

        let scene, camera, renderer, controls, audioCtx;
        let move = {f:false, b:false, l:false, r:false};
        let animals = [], chunks = new Map();
        let score = 0, ammo = 30;
        const CHUNK_SIZE = 160, RENDER_DISTANCE = 8;

        // More distinct vegetation templates
        const vegTypes = {
            evergreen: {type:'cone', trunkR:1.4, trunkH:14, trunkC:0x5C4033, leafC:0x0F4C2B, layers:4, spread:0.9},
            maple: {type:'broad', trunkR:1.6, trunkH:11, trunkC:0x8B5A2B, leafC:0xC23D2E, layers:3, spread:1.4, branchy:true},
            fruit: {type:'broad', trunkR:1.5, trunkH:9, trunkC:0x6B4E3D, leafC:0x2E8B57, layers:3, spread:1.1, fruit:true},
            bush: {type:'bush', trunkR:0, trunkH:0, leafC:0x1e5c2b, layers:3, spread:1.6}
        };

        function init() {
            scene = new THREE.Scene(); scene.fog = new THREE.Fog(0x88aaff, 380, 1550);
            camera = new THREE.PerspectiveCamera(68, innerWidth/innerHeight, 0.1, 2800);
            renderer = new THREE.WebGLRenderer({antialias:true});
            renderer.setSize(innerWidth, innerHeight); renderer.setClearColor(0x88aaff);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.75));
            const sun = new THREE.DirectionalLight(0xffeedd, 1.2); sun.position.set(110,165,75); scene.add(sun);

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            controls = new THREE.PointerLockControls(camera, document.body);
            document.addEventListener('click', () => controls.lock());

            controls.addEventListener('lock', () => document.getElementById('instructions').style.display='none');
            controls.addEventListener('unlock', () => document.getElementById('instructions').style.display='block');

            document.addEventListener('keydown', e => {
                if(e.code==='KeyW') move.f=true; if(e.code==='KeyS') move.b=true;
                if(e.code==='KeyA') move.l=true; if(e.code==='KeyD') move.r=true;
                if(e.code==='KeyR') {ammo=30; updateUI();}
            });
            document.addEventListener('keyup', e => {
                if(e.code==='KeyW') move.f=false; if(e.code==='KeyS') move.b=false;
                if(e.code==='KeyA') move.l=false; if(e.code==='KeyD') move.r=false;
            });
            document.addEventListener('mousedown', e => { if(controls.isLocked && e.button===0) shoot(); });

            window.addEventListener('resize', () => { camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

            generateChunk(0,0);
            for(let i=0;i<16;i++) {
                const d=70+Math.random()*180, a=Math.random()*Math.PI*2;
                spawnAnimal(Math.cos(a)*d, Math.sin(a)*d);
            }

            camera.position.set(0,30,55);
            updateUI();
            animate();
        }

        function generateChunk(cx, cz) {
            const key = `${cx},${cz}`; if(chunks.has(key)) return;
            const group = new THREE.Group();

            const geo = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE, 52, 52);
            geo.rotateX(-Math.PI/2);
            const verts = geo.attributes.position.array;
            for(let i=0;i<verts.length;i+=3) {
                const wx=verts[i]+cx*CHUNK_SIZE, wz=verts[i+2]+cz*CHUNK_SIZE;
                verts[i+1] = noise(wx,wz);
            }
            geo.computeVertexNormals();
            group.add(new THREE.Mesh(geo, new THREE.MeshLambertMaterial({color:0x336633})));

            for(let i=0;i<14;i++) {
                const tx = cx*CHUNK_SIZE + Math.random()*CHUNK_SIZE;
                const tz = cz*CHUNK_SIZE + Math.random()*CHUNK_SIZE;
                if(Math.random() > 0.32) createVegetation(tx, noise(tx,tz)+1.5, tz, group);
            }

            scene.add(group);
            chunks.set(key, group);
        }

        function createVegetation(x, y, z, parent) {
            const keys = Object.keys(vegTypes);
            const cfg = vegTypes[keys[Math.floor(Math.random()*keys.length)]];

            if (cfg.type === 'bush') {
                const fmat = new THREE.MeshLambertMaterial({color: cfg.leafC});
                for(let i=0; i<cfg.layers; i++) {
                    const bush = new THREE.Mesh(new THREE.SphereGeometry(3.2 - i*0.6, 8, 8), fmat);
                    bush.position.set(x, y + 1.5 + i*1.8, z);
                    bush.scale.set(1.4, 0.7, 1.4);
                    parent.add(bush);
                }
                return;
            }

            // Trunk for trees
            if (cfg.trunkH > 0) {
                const trunk = new THREE.Mesh(
                    new THREE.CylinderGeometry(cfg.trunkR, cfg.trunkR*1.3, cfg.trunkH, 8),
                    new THREE.MeshLambertMaterial({color: cfg.trunkC})
                );
                trunk.position.set(x, y + cfg.trunkH/2, z);
                parent.add(trunk);
            }

            const fmat = new THREE.MeshLambertMaterial({color: cfg.leafC});
            const layerCount = cfg.layers || 3;

            if (cfg.type === 'broad' || cfg.branchy) {
                // Branchy / rounded canopy for maple & fruit
                for(let i=0; i<layerCount; i++) {
                    const canopy = new THREE.Mesh(new THREE.SphereGeometry(4.5 + Math.random()*1.5 - i, 8, 8), fmat);
                    canopy.position.set(x + (Math.random()-0.5)*1.5, y + 6 + i*3.5, z + (Math.random()-0.5)*1.5);
                    parent.add(canopy);
                }
            } else {
                // Classic cone for evergreen
                for(let i=0; i<layerCount; i++) {
                    const cone = new THREE.Mesh(new THREE.ConeGeometry(5.5 - i*1.2, 7, 8), fmat);
                    cone.position.set(x, y + 8 + i*4.5, z);
                    parent.add(cone);
                }
            }

            // Fruits
            if (cfg.fruit) {
                for(let i=0; i<6; i++) {
                    const fruit = new THREE.Mesh(new THREE.SphereGeometry(0.55, 8, 8), new THREE.MeshLambertMaterial({color:0xFF2222}));
                    fruit.position.set(x+(Math.random()-0.5)*5, y+9+Math.random()*5, z+(Math.random()-0.5)*5);
                    parent.add(fruit);
                }
            }
        }

        function spawnAnimal(x, z) { /* same as before - we can expand later */ 
            const h = noise(x,z) + 4;
            const animal = new THREE.Group();
            animal.add(new THREE.Mesh(new THREE.BoxGeometry(3,2.2,6), new THREE.MeshLambertMaterial({color:0x8B5A2B})));
            const head = new THREE.Mesh(new THREE.SphereGeometry(1.8,8,8), new THREE.MeshLambertMaterial({color:0xA0522D}));
            head.position.set(0,2.8,3); animal.add(head);
            animal.position.set(x,h,z);
            animal.userData = {vel:new THREE.Vector3((Math.random()-0.5)*0.7,0,(Math.random()-0.5)*0.7), alive:true, hp:3, bob:0};
            scene.add(animal); animals.push(animal);
        }

        function playGunshot() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(180, audioCtx.currentTime);
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.45);
        }

        function shoot() {
            if(ammo<=0) return;
            ammo--; updateUI();
            playGunshot();

            const ray = new THREE.Raycaster(); ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(scene.children, true);
            if(hits.length) {
                let o = hits[0].object;
                while(o) {
                    if(animals.includes(o.parent)) {
                        const a = o.parent; a.userData.hp--;
                        if(a.userData.hp<=0 && a.userData.alive) {
                            a.userData.alive=false; score+=100; updateUI();
                            a.scale.set(0.6,0.3,0.6);
                            setTimeout(()=>{scene.remove(a); animals.splice(animals.indexOf(a),1);},1000);
                        }
                        break;
                    }
                    o = o.parent;
                }
            }
        }

        function updateUI() {
            document.getElementById('ammoCount').textContent = ammo;
            document.getElementById('score').textContent = `Score: ${score}`;
        }

        function updateChunks() {
            const cx = Math.floor(camera.position.x / CHUNK_SIZE);
            const cz = Math.floor(camera.position.z / CHUNK_SIZE);
            for(let x=cx-RENDER_DISTANCE; x<=cx+RENDER_DISTANCE; x++) {
                for(let z=cz-RENDER_DISTANCE; z<=cz+RENDER_DISTANCE; z++) {
                    generateChunk(x,z);
                }
            }
        }

        function updateAnimals(delta) {
            for(let i=animals.length-1;i>=0;i--) {
                const a=animals[i]; if(!a.userData.alive) continue;
                a.position.x += a.userData.vel.x * delta * 18;
                a.position.z += a.userData.vel.z * delta * 18;
                a.position.y = noise(a.position.x, a.position.z) + 3.5 + Math.sin(a.userData.bob += delta*4.5)*0.4;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = 0.016;
            if(controls.isLocked) {
                const dx = (move.r?1:0)-(move.l?1:0);
                const dz = (move.f?1:0)-(move.b?1:0);
                const len = Math.hypot(dx,dz)||1;
                controls.moveRight(dx/len * 42 * delta);
                controls.moveForward(dz/len * 42 * delta);

                const th = noise(camera.position.x, camera.position.z) + 10;
                if(camera.position.y < th) camera.position.y = th;
                else if(camera.position.y > th + 5) camera.position.y -= 1.4;

                updateChunks();
                updateAnimals(delta);
            }
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>

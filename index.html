<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Infinite Wilds - Procedural 3D Open World</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: white; pointer-events: none;
            text-shadow: 0 0 5px black; z-index: 100;
        }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; font-size: 30px; 
            transform: translate(-50%, -50%); pointer-events: none; color: white;
            text-shadow: 0 0 8px black; z-index: 100;
        }
        #instructions {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 10px 20px; border-radius: 8px;
            text-align: center; pointer-events: none; z-index: 100;
        }
        #ammo { 
            position: absolute; bottom: 80px; right: 20px; color: white; 
            font-size: 24px; text-shadow: 0 0 5px black; z-index: 100;
        }
        #score {
            position: absolute; top: 10px; right: 20px; color: #ffcc00; 
            font-size: 28px; text-shadow: 0 0 8px black; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 18px;">INFINITE WILDS</div>
        <div>WASD - Move | Mouse - Look | Left Click - Shoot | R - Reload</div>
    </div>
    <div id="score">Score: 0</div>
    <div id="crosshair">+</div>
    <div id="ammo">Ammo: <span id="ammoCount">30</span>/∞</div>
    <div id="instructions">
        Click to lock pointer and begin your journey<br>
        Explore the endless wilderness • Hunt animals
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/PointerLockControls.min.js"></script>

    <script>
        // Improved noise function
        function noise(x, z) {
            let n = Math.sin(x * 0.03) * 12 + 
                    Math.sin(z * 0.03) * 12 +
                    Math.sin((x + z) * 0.015) * 8 +
                    Math.sin(x * 0.08) * 3;
            return n;
        }

        let scene, camera, renderer, controls;
        let move = { forward: false, backward: false, left: false, right: false };
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let animals = [];
        let chunks = new Map();
        let score = 0;
        let ammo = 30;
        const CHUNK_SIZE = 128;
        const RENDER_DISTANCE = 6; // Much farther view

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x88aaff, 300, 1200);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 2000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x88aaff);
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.65);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffeedd, 1.1);
            sun.position.set(80, 120, 60);
            scene.add(sun);

            controls = new THREE.PointerLockControls(camera, document.body);
            
            document.addEventListener('click', () => controls.lock());

            controls.addEventListener('lock', () => document.getElementById('instructions').style.display = 'none');
            controls.addEventListener('unlock', () => document.getElementById('instructions').style.display = 'block');

            document.addEventListener('keydown', e => {
                switch(e.code) {
                    case 'KeyW': move.forward = true; break;
                    case 'KeyS': move.backward = true; break;
                    case 'KeyA': move.left = true; break;
                    case 'KeyD': move.right = true; break;
                    case 'KeyR': ammo = 30; updateUI(); break;
                }
            });

            document.addEventListener('keyup', e => {
                switch(e.code) {
                    case 'KeyW': move.forward = false; break;
                    case 'KeyS': move.backward = false; break;
                    case 'KeyA': move.left = false; break;
                    case 'KeyD': move.right = false; break;
                }
            });

            document.addEventListener('mousedown', e => {
                if (controls.isLocked && e.button === 0) shoot();
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            generateChunk(0, 0);
            
            for(let i = 0; i < 12; i++) {
                const dist = 40 + Math.random() * 120;
                const angle = Math.random() * Math.PI * 2;
                spawnAnimal(Math.cos(angle) * dist, Math.sin(angle) * dist);
            }

            camera.position.set(5, 25, 40);
            updateUI();
            animate();
        }

        function getChunkKey(cx, cz) {
            return `${cx},${cz}`;
        }

        function generateChunk(cx, cz) {
            const key = getChunkKey(cx, cz);
            if (chunks.has(key)) return;
            
            const chunkGroup = new THREE.Group();
            
            const geometry = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE, 48, 48);
            geometry.rotateX(-Math.PI / 2);
            
            const vertices = geometry.attributes.position.array;
            for (let i = 0; i < vertices.length; i += 3) {
                const x = vertices[i] + cx * CHUNK_SIZE;
                const z = vertices[i + 2] + cz * CHUNK_SIZE;
                vertices[i + 1] = noise(x, z);
            }
            geometry.computeVertexNormals();
            
            const terrain = new THREE.Mesh(geometry, new THREE.MeshLambertMaterial({ 
                color: 0x356b35,
                flatShading: false
            }));
            terrain.position.set(cx * CHUNK_SIZE, 0, cz * CHUNK_SIZE);
            chunkGroup.add(terrain);
            
            // Sparser, more spread-out trees
            for (let i = 0; i < 18; i++) {
                const tx = cx * CHUNK_SIZE + Math.random() * CHUNK_SIZE;
                const tz = cz * CHUNK_SIZE + Math.random() * CHUNK_SIZE;
                const height = noise(tx, tz);
                if (Math.random() > 0.35) {
                    createTree(tx, height + 1.5, tz, chunkGroup);
                }
            }
            
            scene.add(chunkGroup);
            chunks.set(key, chunkGroup);
        }

        function createTree(x, y, z, parent) {
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(1.1, 1.6, 7 + Math.random() * 4, 8),
                new THREE.MeshLambertMaterial({ color: 0x6B4E3D })
            );
            trunk.position.set(x, y + 4, z);
            parent.add(trunk);
            
            const foliageMat = new THREE.MeshLambertMaterial({ color: 0x1e5c2b });
            for (let i = 0; i < 3; i++) {
                const leaves = new THREE.Mesh(
                    new THREE.ConeGeometry(4.5 - i * 0.6, 7, 8),
                    foliageMat
                );
                leaves.position.set(x, y + 9 + i * 3.5, z);
                parent.add(leaves);
            }
        }

        function spawnAnimal(x, z) {
            const height = noise(x, z) + 3;
            const animal = new THREE.Group();
            
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2.8, 2.2, 5.5),
                new THREE.MeshLambertMaterial({ color: 0x8B5A2B })
            );
            body.position.y = 2.5;
            animal.add(body);
            
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(1.6, 8, 8),
                new THREE.MeshLambertMaterial({ color: 0xA0522D })
            );
            head.position.set(0, 3.2, 2.8);
            animal.add(head);
            
            animal.position.set(x, height, z);
            animal.userData = { 
                velocity: new THREE.Vector3((Math.random()-0.5)*0.6, 0, (Math.random()-0.5)*0.6),
                alive: true,
                health: 3,
                bob: 0
            };
            
            scene.add(animal);
            animals.push(animal);
        }

        function shoot() {
            if (ammo <= 0) return;
            ammo--;
            updateUI();
            
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            
            const intersects = raycaster.intersectObjects(scene.children, true);
            
            if (intersects.length > 0) {
                let obj = intersects[0].object;
                while (obj) {
                    if (animals.includes(obj.parent)) {
                        const animal = obj.parent;
                        animal.userData.health--;
                        if (animal.userData.health <= 0 && animal.userData.alive) {
                            animal.userData.alive = false;
                            score += 100;
                            updateUI();
                            animal.scale.set(0.7, 0.4, 0.7);
                            setTimeout(() => {
                                scene.remove(animal);
                                const idx = animals.indexOf(animal);
                                if (idx > -1) animals.splice(idx, 1);
                            }, 1200);
                        }
                        break;
                    }
                    obj = obj.parent;
                }
            }
        }

        function updateUI() {
            document.getElementById('ammoCount').textContent = ammo;
            document.getElementById('score').textContent = `Score: ${score}`;
        }

        function updateChunks() {
            const cx = Math.floor(camera.position.x / CHUNK_SIZE);
            const cz = Math.floor(camera.position.z / CHUNK_SIZE);
            
            for (let x = cx - RENDER_DISTANCE; x <= cx + RENDER_DISTANCE; x++) {
                for (let z = cz - RENDER_DISTANCE; z <= cz + RENDER_DISTANCE; z++) {
                    generateChunk(x, z);
                }
            }
        }

        function updateAnimals(delta) {
            for (let i = animals.length - 1; i >= 0; i--) {
                const a = animals[i];
                if (!a.userData.alive) continue;
                
                a.position.x += a.userData.velocity.x * delta * 18;
                a.position.z += a.userData.velocity.z * delta * 18;
                
                const groundY = noise(a.position.x, a.position.z) + 3;
                a.position.y = groundY + Math.sin(a.userData.bob += delta * 4) * 0.3;
                
                if (Math.random() < 0.015) {
                    a.userData.velocity.set((Math.random() - 0.5) * 1.1, 0, (Math.random() - 0.5) * 1.1);
                }
                
                const dx = a.position.x - camera.position.x;
                const dz = a.position.z - camera.position.z;
                if (dx*dx + dz*dz > 900*900) {
                    scene.remove(a);
                    animals.splice(i, 1);
                    const spawnDist = 120 + Math.random() * 200;
                    const angle = Math.random() * Math.PI * 2;
                    spawnAnimal(camera.position.x + Math.cos(angle) * spawnDist, camera.position.z + Math.sin(angle) * spawnDist);
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = 0.016;
            
            if (controls.isLocked) {
                direction.z = Number(move.forward) - Number(move.backward);
                direction.x = Number(move.right) - Number(move.left);
                direction.normalize();
                
                const speed = 55;
                controls.moveRight(direction.x * speed * delta);
                controls.moveForward(direction.z * speed * delta);
                
                // Proper terrain following (gravity fix)
                const terrainHeight = noise(camera.position.x, camera.position.z) + 9;
                if (camera.position.y < terrainHeight) camera.position.y = terrainHeight;
                
                updateChunks();
                updateAnimals(delta);
            }
            
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
